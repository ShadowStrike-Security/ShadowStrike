name: Coverity Scan

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  coverity:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Download Coverity Build Tool (Windows)
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $token = "${{ secrets.COVERITY_SCAN_TOKEN }}"
          $project = "ShadowStrike-Labs/ShadowStrike"
          $url = "https://scan.coverity.com/download/cxx/win64?token=${token}&project=${project}"
          
          Write-Host "Downloading Coverity..."
          Invoke-WebRequest -Uri $url -OutFile "cov-analysis-win64.zip" -ErrorAction Stop
          
          Write-Host "Extracting..."
          Expand-Archive -Path "cov-analysis-win64.zip" -DestinationPath "." -Force
          
          Write-Host "Done"
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1
      
      - name: Build PhantomSensor with Coverity
        shell: powershell
        run: |
          # Find Coverity directory
          $covDir = Get-ChildItem -Filter "cov-analysis-win64*" -Directory | Select-Object -First 1
          Write-Host "Found Coverity at: $($covDir.FullName)"
          
          # Set PATH
          $env:PATH = "$($covDir.FullName)\bin;$env:PATH"
          
          # Create cov-int
          New-Item -ItemType Directory -Path "cov-int" -Force | Out-Null
          
          # Build
          Write-Host "Building with Coverity..."
          cov-build --dir cov-int msbuild PhantomSensor\PhantomSensor.vcxproj /t:Build /p:Configuration=Release /p:Platform=x64
          
          # Analyze
          Write-Host "Analyzing..."
          cov-analyze --dir cov-int --strip-path $PWD
      
      - name: Submit to Coverity
        shell: powershell
        run: |
          Write-Host "Creating archive..."
          tar -czf cov-int.tar.gz cov-int
          
          Write-Host "Submitting..."
          $token = "${{ secrets.COVERITY_SCAN_TOKEN }}"
          $email = "${{ secrets.COVERITY_SCAN_EMAIL }}"
          
          curl.exe --form "token=${token}" `
                   --form "email=${email}" `
                   --form "file=@cov-int.tar.gz" `
                   --form "version=${{ github.sha }}" `
                   --form "description=PhantomSensor" `
                   https://scan.coverity.com/builds
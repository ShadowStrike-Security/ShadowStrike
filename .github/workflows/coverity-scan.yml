name: Coverity Scan

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  coverity:
    runs-on: windows-2022
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download Coverity Build Tool (Windows)
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $token = "${{ secrets.COVERITY_SCAN_TOKEN }}"
          $project = "ShadowStrike-Labs/ShadowStrike"
          $url = "https://scan.coverity.com/download/cxx/win64?token=${token}&project=${project}"
          
          Write-Host "Downloading Coverity..."
          Invoke-WebRequest -Uri $url -OutFile "cov-analysis-win64.zip" -ErrorAction Stop
          
          Write-Host "Extracting..."
          Expand-Archive -Path "cov-analysis-win64.zip" -DestinationPath "." -Force
          
          Write-Host "Done"

      - name: Verify WDK Installation
        shell: powershell
        run: |
          $wdkRoot = "C:\Program Files (x86)\Windows Kits\10"
          $includeDir = Join-Path $wdkRoot "Include"

          $kmVersions = Get-ChildItem $includeDir -Directory |
              Where-Object { Test-Path (Join-Path $_.FullName "km\ntifs.h") } |
              Sort-Object { [Version]($_.Name -replace '[^0-9.]','') } -Descending

          if ($null -eq $kmVersions -or $kmVersions.Count -eq 0) {
              Write-Error "FATAL: No WDK directory with km\ntifs.h found under $includeDir"
              exit 1
          }

          $selectedVer = $kmVersions[0].Name
          Write-Host "Selected WDK version: $selectedVer"
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build PhantomSensor with Coverity
        shell: powershell
        run: |
          $covDir = Get-ChildItem -Filter "cov-analysis-win64*" -Directory | Select-Object -First 1
          if ($null -eq $covDir) { Write-Error "Coverity Build Tool directory not found"; exit 1 }
          $env:PATH = "$($covDir.FullName)\bin;$env:PATH"
          
          # Derleyiciyi Coverity'ye tanıt (MSVC için kritik)
          cov-configure --msvc
          
          New-Item -ItemType Directory -Path "cov-int" -Force | Out-Null
          Write-Host "Running cov-build..."
          cov-build --dir cov-int msbuild PhantomSensor\PhantomSensor.vcxproj /t:Build /p:Configuration=Release /p:Platform=x64 /p:InfVerif_Enable=false /p:InfVerif_NoError=true
          
          $tuCount = (Get-ChildItem -Path "cov-int\emit" -Recurse -File -ErrorAction SilentlyContinue).Count
          if ($tuCount -eq 0) { Write-Error "cov-build emitted 0 translation units - build failed"; exit 1 }
          Write-Host "cov-build captured $tuCount emit files"
      
      - name: Submit to Coverity
        shell: powershell
        run: |
          Write-Host "Creating ZIP archive..."
          # Klasörü düzgünce zipleyelim
          Compress-Archive -Path "cov-int" -DestinationPath "cov-int.zip" -Force
          
          $fileSize = (Get-Item "cov-int.zip").Length / 1MB
          Write-Host "Archive size: $([math]::Round($fileSize, 2)) MB"
          
          Write-Host "Submitting to Coverity Scan..."
          $token = "${{ secrets.COVERITY_SCAN_TOKEN }}"
          $email = "${{ secrets.COVERITY_SCAN_EMAIL }}"
          
          # Project parametresi eklendi ve dosya formatı ZIP olarak güncellendi
          curl.exe --fail --show-error `
                   --form "token=${token}" `
                   --form "email=${email}" `
                   --form "project=ShadowStrike-Labs/ShadowStrike" `
                   --form "file=@cov-int.zip" `
                   --form "version=${{ github.sha }}" `
                   --form "description=PhantomSensor Kernel Driver - ${{ github.ref_name }}" `
                   https://scan.coverity.com/builds
          
          if ($LASTEXITCODE -ne 0) {
              Write-Error "Coverity submission failed"
              exit $LASTEXITCODE
          }
          
          Write-Host "Coverity submission complete"
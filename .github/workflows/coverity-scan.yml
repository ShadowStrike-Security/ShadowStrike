name: Coverity Scan

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  coverity:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Download Coverity Build Tool (Windows)
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          wget -Uri "https://scan.coverity.com/download/cxx/win64" `
               -OutFile "cov-analysis-win64.zip" `
               -Headers @{"token"="${{ secrets.COVERITY_SCAN_TOKEN }}";"project"="ShadowStrike-Labs/ShadowStrike"}
          Expand-Archive -Path "cov-analysis-win64.zip" -DestinationPath "."
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1
      
      - name: Build PhantomSensor with Coverity
        shell: cmd
        run: |
          set PATH=%CD%\cov-analysis-win64\bin;%PATH%
          cov-build --dir cov-int msbuild PhantomSensor\PhantomSensor.vcxproj /t:Build /p:Configuration=Release /p:Platform=x64 || exit /b 0
          cov-analyze --dir cov-int --strip-path %CD% --enable-virtual-functions || exit /b 0
      
      - name: Submit results to Coverity Scan
        shell: powershell
        run: |
          $file = Get-Item "cov-int"
          tar -czf cov-int.tar.gz cov-int
          curl.exe --form "token=${{ secrets.COVERITY_SCAN_TOKEN }}" `
                   --form "email=${{ secrets.COVERITY_SCAN_EMAIL }}" `
                   --form "file=@cov-int.tar.gz" `
                   --form "version=${{ github.sha }}" `
                   --form "description=PhantomSensor Kernel Driver" `
                   https://scan.coverity.com/builds
      
      - name: Save Coverity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverity-phantom-sensor
          path: cov-int/